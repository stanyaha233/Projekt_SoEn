name: Workflows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      # 1. Installiert Java (JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 2. NEU: Installiert sbt auf dem Server (Löst das "command not found" Problem!)
      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      # 3. Führt die Tests aus und erstellt den Coverage-Bericht (Aufgabe 3)
      - name: Run tests with coverage
        run: sbt clean coverage test coverageReport

      # 4. Sendet die Daten an Coveralls (Aufgabe 3)
      - name: Upload to Coveralls
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: sbt coveralls

      # 5. Führt Stryker Mutation Testing aus (Aufgabe 4)
      - name: Run Stryker Mutation Testing
        run: sbt stryker

      # 6. Speichert den Stryker-Bericht als herunterladbare Datei (Aufgabe 4)
      - name: Upload Stryker Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-report
          path: target/stryker4s-report/