name: Workflows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      # 1. Installiert Java (JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 2. Richtet sbt auf dem Server ein
      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      # 3. Führt Tests aus und generiert die Reports direkt für dein sbt-Projekt
      - name: Run tests with coverage
        run: sbt clean coverage project root test coverageReport coverageAggregate

      # 4. Lädt die Daten zu Coveralls hoch (Wechselt explizit in das Projekt, damit er die XML findet)
      - name: Upload to Coveralls
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: sbt "project root" coveralls

      # 5. Führt Stryker Mutation Testing aus
      - name: Run Stryker Mutation Testing
        run: sbt stryker

      # 6. Speichert den Stryker-Bericht als ZIP-Datei auf GitHub
      - name: Upload Stryker Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-report
          path: target/stryker4s-report/